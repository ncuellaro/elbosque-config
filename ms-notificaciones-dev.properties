spring.datasource.url=jdbc:postgresql://localhost:5432/elbosque_notificaciones
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.exchange.ordenes=ordenes.exchange
rabbitmq.queue.ejecutada=ordenes.ejecutada.notificaciones.queue
rabbitmq.routing.key.ejecutada=ordenes.ejecutada

rabbitmq.exchange.mercados=mercados.exchange
rabbitmq.queue.alerta.precio=mercados.alerta.precio.queue
rabbitmq.routing.key.alerta=mercados.alerta.precio

sendgrid.api.key=${SENDGRID_KEY}
sendgrid.from.email=noreply@accioneselbosque.com
sendgrid.from.name=Acciones ElBosque

twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.phone.number=${TWILIO_PHONE}

spring.elasticsearch.uris=http://localhost:9200
logging.level.co.edu.elbosque=INFO
