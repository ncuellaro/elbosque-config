spring.datasource.url=jdbc:postgresql://localhost:5432/elbosque_usuarios
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.exchange.usuarios=usuarios.exchange
rabbitmq.queue.registro=usuarios.registro.queue
rabbitmq.routing.key.registro=usuarios.registro

stripe.api.key=${STRIPE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.price.mensual=${STRIPE_PRICE_MENSUAL}
stripe.price.anual=${STRIPE_PRICE_ANUAL}

alpaca.api.key=${ALPACA_KEY}
alpaca.api.secret=${ALPACA_SECRET}
alpaca.base.url=https://paper-api.alpaca.markets
alpaca.broker.url=https://broker-api.sandbox.alpaca.markets

spring.elasticsearch.uris=http://localhost:9200
logging.level.co.edu.elbosque=INFO
